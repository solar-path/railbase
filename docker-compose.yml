# Local dev stack: managed Postgres alongside Railbase.
#
# For the zero-config experience use `make build-embed` and run the
# binary directly with --embed-postgres instead — this compose file is
# for the "real Postgres in a container" workflow that mirrors prod.

services:
  postgres:
    image: postgres:16-alpine
    container_name: railbase-pg
    environment:
      POSTGRES_USER: railbase
      POSTGRES_PASSWORD: railbase
      POSTGRES_DB: railbase
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railbase -d railbase"]
      interval: 5s
      timeout: 3s
      retries: 5

  railbase:
    build:
      context: .
      args:
        COMMIT: ${COMMIT:-dev}
        TAG: ${TAG:-v0.0.0-dev}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RAILBASE_DSN: postgres://railbase:railbase@postgres:5432/railbase?sslmode=disable
      RAILBASE_HTTP_ADDR: ":8090"
      RAILBASE_LOG_LEVEL: info
      RAILBASE_LOG_FORMAT: json
    ports:
      - "8090:8090"
    restart: unless-stopped

volumes:
  pgdata:
